<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claude Usage</title>
<style>
  :root{
    --bg:#000;
    --panel:#0d0d0d;
    --panel-2:#141414;
    --line:#1f1f1f;
    --line-2:#2a2a2a;
    --ink:#fff;
    --ink-dim:#666;
    --ink-faint:#333;
    --accent:#DE7356;
    --accent-dim:rgba(222,115,86,.16);
    --accent-glow:rgba(222,115,86,.4);
    --watch:#c47a3a;
    --hot:#a03020;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;
    height:100%;overflow:hidden;
  }
  body{display:flex;justify-content:center;align-items:flex-start;padding:0}
  .widget{
    width:100%;max-width:430px;
    display:flex;flex-direction:column;
    height:100vh;height:100dvh;
    overflow:hidden;
    border-left:1px solid var(--line);border-right:1px solid var(--line);
  }
  .divider{height:1px;background:var(--line);flex-shrink:0}

  /* ── HEADER ── */
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;flex-shrink:0;background:var(--bg)}
  .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .glow-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0;
    box-shadow:0 0 6px var(--accent),0 0 14px var(--accent-glow),0 0 28px var(--accent-glow)}
  .brand-title{font-size:12px;letter-spacing:.18em;font-weight:600;color:var(--ink);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .stamp{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .iconbtn{background:none;border:1px solid var(--line-2);color:var(--ink-dim);width:28px;height:28px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
  .iconbtn:hover{color:var(--accent);border-color:var(--accent)}

  /* ── EDITOR ── */
  .editor{display:none;flex-direction:column;gap:12px;background:var(--bg);padding:14px;overflow-y:auto;flex-shrink:0}
  .editor.open{display:flex}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  input,select{background:var(--panel-2);border:1px solid var(--line-2);color:var(--ink);border-radius:7px;padding:9px 10px;font-size:13px;font-family:var(--mono);width:100%}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .slider-wrap{display:flex;align-items:center;gap:10px}
  input[type=range]{-webkit-appearance:none;height:4px;background:var(--panel-2);border:1px solid var(--line-2);border-radius:4px;padding:0;flex:1}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
  .slider-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);min-width:38px;text-align:right}
  .save{background:var(--accent);color:#1a0800;border:none;border-radius:8px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.08em;text-transform:uppercase}
  .save:active{opacity:.82}
  .hint{font-size:10px;color:var(--ink-faint);line-height:1.6}
  .ed-div{height:1px;background:var(--line)}

  /* ── CIRCLES ── */
  .circles-section{flex-shrink:0;padding:14px 14px 10px;display:flex;gap:10px;justify-content:center}
  .circle-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
  .circle-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-dim);font-weight:600}
  .circle-svg{width:120px;height:120px}
  .c-track{fill:none;stroke:var(--panel-2);stroke-width:7}
  .c-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1),stroke .4s}

  /* ── SESSION WINDOWS ── */
  .sessions-section{flex-shrink:0;padding:0 14px 10px}
  .sec-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:8px}
  .splits{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
  .split{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 2px;text-align:center;transition:.15s}
  .split.now{background:var(--accent-dim);border-color:var(--accent)}
  .split.now .sn,.split.now .st{color:var(--accent)}
  .sn{font-family:var(--mono);font-size:9px;color:var(--ink-faint);display:block;margin-bottom:2px}
  .st{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-dim)}

  /* ── WEEKLY RAIL ── */
  .weekly-section{flex-shrink:0;padding:0 14px 14px;display:flex;flex-direction:column}
  .rail-days{display:flex;justify-content:space-between;margin-bottom:5px;cursor:pointer;user-select:none}
  .rail-days span{font-size:9px;font-family:var(--mono);color:var(--ink-faint);width:14.28%;text-align:center;transition:.2s;padding:2px 0}
  .rail-days span.today{color:var(--accent);font-weight:700}
  .rail-days span.show-pct{color:var(--ink-dim)}
  .rail-days span.today.show-pct{color:var(--accent)}
  .rail{position:relative;height:26px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .rail-grid{position:absolute;inset:0;display:flex;pointer-events:none}
  .rail-grid i{flex:1;border-right:1px dashed rgba(255,255,255,.04)}
  .rail-grid i:last-child{border-right:none}
  .rail-fill{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,rgba(222,115,86,.12),rgba(222,115,86,.38));border-right:2px solid var(--accent);transition:width .5s ease}
  .now-marker{position:absolute;top:0;bottom:0;width:2px;background:#fff;opacity:.6;transition:left .5s ease}
  .now-marker::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 5px rgba(255,255,255,.5)}
  .pace-read{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .pace-stat{font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  .pace-stat b{color:var(--ink);font-weight:600}
  .pace-verdict{font-size:10px;font-weight:600;letter-spacing:.05em}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="widget">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <span class="glow-dot"></span>
      <span class="brand-title" id="brandTitle">Claude Usage</span>
    </div>
    <div class="header-right">
      <span class="stamp" id="stamp"></span>
      <button class="iconbtn" id="editToggle" aria-label="Edit">✎</button>
    </div>
  </div>
  <div class="divider"></div>

  <!-- EDITOR -->
  <div class="editor" id="editor">
    <div class="field">
      <label>Widget title</label>
      <input type="text" id="inTitle" placeholder="Claude Usage" maxlength="32">
    </div>
    <div class="ed-div"></div>
    <div class="field">
      <label>5-hour session used</label>
      <div class="slider-wrap">
        <input type="range" id="inSession" min="0" max="100" step="1">
        <span class="slider-val" id="valSession">0%</span>
      </div>
    </div>
    <div class="field">
      <label>Weekly used</label>
      <div class="slider-wrap">
        <input type="range" id="inWeekly" min="0" max="100" step="1">
        <span class="slider-val" id="valWeekly">0%</span>
      </div>
    </div>
    <div class="ed-div"></div>
    <div class="field">
      <label>Current session started at</label>
      <input type="time" id="inSessionReset">
    </div>
    <div class="row2">
      <div class="field">
        <label>Weekly reset day</label>
        <select id="inWeekDay">
          <option value="0">Sunday</option><option value="1">Monday</option>
          <option value="2">Tuesday</option><option value="3">Wednesday</option>
          <option value="4">Thursday</option><option value="5">Friday</option>
          <option value="6">Saturday</option>
        </select>
      </div>
      <div class="field">
        <label>Weekly reset time</label>
        <input type="time" id="inWeekTime">
      </div>
    </div>
    <button class="save" id="saveBtn">Save</button>
    <p class="hint">Enter when your current 5h session started — widget adds 5h to get the real next reset. Update the two percentages from Claude's usage tab whenever you check in.</p>
  </div>

  <!-- CIRCLES -->
  <div class="circles-section">

    <!-- SESSION -->
    <div class="circle-wrap">
      <span class="circle-label">5-Hour Session</span>
      <!-- r=52, circ=2π×52≈326.73 -->
      <svg class="circle-svg" viewBox="0 0 120 120">
        <circle class="c-track" cx="60" cy="60" r="52"/>
        <circle class="c-fill" id="sessArc" cx="60" cy="60" r="52"
          stroke-dasharray="326.73" stroke-dashoffset="326.73"
          transform="rotate(-90 60 60)" stroke="#DE7356"/>
        <!-- pct top -->
        <text id="sessPctTxt" x="60" y="52" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#fff">0%</text>
        <!-- countdown middle -->
        <text id="sessCdTxt" x="60" y="67" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="9" fill="#DE7356">—</text>
        <!-- reset abs bottom -->
        <text id="sessAbsTxt" x="60" y="80" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="8" fill="#444">—</text>
      </svg>
    </div>

    <!-- WEEKLY -->
    <div class="circle-wrap">
      <span class="circle-label">Weekly</span>
      <svg class="circle-svg" viewBox="0 0 120 120">
        <circle class="c-track" cx="60" cy="60" r="52"/>
        <circle class="c-fill" id="weekArc" cx="60" cy="60" r="52"
          stroke-dasharray="326.73" stroke-dashoffset="326.73"
          transform="rotate(-90 60 60)" stroke="#DE7356"/>
        <text id="weekPctTxt" x="60" y="52" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#fff">0%</text>
        <text id="weekCdTxt" x="60" y="67" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="9" fill="#DE7356">—</text>
        <text id="weekAbsTxt" x="60" y="80" text-anchor="middle"
          font-family="ui-monospace,monospace" font-size="8" fill="#444">—</text>
      </svg>
    </div>

  </div>
  <div class="divider"></div>

  <!-- SESSION WINDOWS -->
  <div class="sessions-section" style="padding-top:10px">
    <div class="sec-label">Session Windows</div>
    <div class="splits" id="splits"></div>
  </div>
  <div class="divider"></div>

  <!-- WEEKLY PACE -->
  <div class="weekly-section" style="padding-top:10px">
    <div class="sec-label">Weekly Pace <span style="color:var(--ink-faint);font-weight:400;letter-spacing:0;text-transform:none">(tap days to toggle %)</span></div>
    <div class="rail-days" id="railDays"></div>
    <div class="rail">
      <div class="rail-grid"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="rail-fill" id="railFill"></div>
      <div class="now-marker" id="nowMarker"></div>
    </div>
    <div class="pace-read">
      <span class="pace-stat">By now <b id="paceIdeal">—</b> · You <b id="paceActual">—</b></span>
      <span class="pace-verdict" id="paceVerdict">—</span>
    </div>
  </div>

</div>
<script>
/* ── storage ── */
const store=(()=>{let mem={},ok=false;try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true;}catch(e){}
  return{
    get:k=>{try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
    set:(k,v)=>{try{ok?localStorage.setItem(k,v):void(mem[k]=v);}catch(e){mem[k]=v;}}
  };})();

/* ── state ── */
const DEF={session:35,weekly:45,sessionReset:"10:30",weekDay:0,weekTime:"09:00",title:"Claude Usage"};
function load(){
  let s={};
  for(const k in DEF){
    const v=store.get("cu_"+k);
    s[k]=v===null?DEF[k]:(k==='sessionReset'||k==='weekTime'||k==='title'?v:+v);
  }
  return s;
}
let S=load();

/* ── day-label toggle state ── */
let showPct=false;

/* ── helpers ── */
const pad=n=>String(n).padStart(2,'0');
function fmtTime(d){let h=d.getHours(),m=d.getMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;return h+":"+pad(m)+" "+ap;}
function fmtTimeShort(d){let h=d.getHours();const ap=h>=12?'p':'a';h=h%12||12;const m=d.getMinutes();return h+(m?":"+pad(m):"")+ap;}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtFull(d){return DOW[d.getDay()]+" "+fmtTime(d);}

// Fixed pace targets, position 0–6 from weekly reset day
const PACE_PCT=[0,14.3,28.6,42.9,57.1,71.4,85.7];

function nextOccurrence(hhmm){
  const[h,m]=hhmm.split(':').map(Number);
  const now=new Date();
  const start=new Date(now);
  start.setHours(h,m,0,0);
  if(start>now)start.setDate(start.getDate()-1);
  return new Date(start.getTime()+5*3600*1000);
}
function weeklyResets(day,hhmm){
  const[h,m]=hhmm.split(':').map(Number);
  const now=new Date();
  const next=new Date(now);
  next.setHours(h,m,0,0);
  let diff=(day-next.getDay()+7)%7;
  next.setDate(next.getDate()+diff);
  if(next<=now)next.setDate(next.getDate()+7);
  const last=new Date(next);last.setDate(last.getDate()-7);
  return{last,next};
}
function cdSession(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000);return Math.floor(s/3600)+":"+pad(Math.floor(s%3600/60))+":"+pad(s%60);}
function cdWeek(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000);const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),mn=Math.floor(s%3600/60);return(d?d+"d ":"")+h+"h "+mn+"m";}

const CIRC=326.73; // 2π×52
function setArc(id,pct,color){
  const el=document.getElementById(id);
  el.style.strokeDashoffset=CIRC-(CIRC*Math.min(pct,100)/100);
  el.setAttribute('stroke',color);
}
function arcColor(p){return p>=85?'#a03020':p>=60?'#c47a3a':'#DE7356';}

/* ── render ── */
function render(){
  const now=new Date();

  // title
  document.getElementById('brandTitle').textContent=S.title||'Claude Usage';
  document.title=S.title||'Claude Usage';

  // arcs + pct text
  const cs=arcColor(S.session),cw=arcColor(S.weekly);
  setArc('sessArc',S.session,cs);
  setArc('weekArc',S.weekly,cw);
  const sp=document.getElementById('sessPctTxt');sp.textContent=S.session+'%';sp.setAttribute('fill',cs);
  const wp=document.getElementById('weekPctTxt');wp.textContent=S.weekly+'%';wp.setAttribute('fill',cw);

  // session countdown + abs inside circle
  const sReset=nextOccurrence(S.sessionReset);
  document.getElementById('sessCdTxt').textContent=cdSession(sReset-now);
  document.getElementById('sessAbsTxt').textContent='→ '+fmtTime(sReset);

  // weekly countdown + abs inside circle
  const{last:wLast,next:wNext}=weeklyResets(S.weekDay,S.weekTime);
  document.getElementById('weekCdTxt').textContent=cdWeek(wNext-now);
  document.getElementById('weekAbsTxt').textContent='→ '+fmtFull(wNext).replace(/ /g,'\u00A0');

  // session windows
  const splits=document.getElementById('splits');splits.innerHTML='';
  const slotStart=new Date(sReset.getTime()-5*3600*1000);
  const slots=[{label:'Now',t:sReset,start:slotStart,end:sReset}];
  for(let i=1;i<=4;i++){
    const t=new Date(sReset.getTime()+i*5*3600*1000);
    slots.push({label:'+'+(i*5)+'h',t,start:new Date(sReset.getTime()+(i-1)*5*3600*1000),end:t});
  }
  slots.forEach((slot,idx)=>{
    const isNow=now>=slot.start&&now<slot.end;
    const cell=document.createElement('div');
    cell.className='split'+(isNow?' now':'');
    cell.innerHTML='<span class="sn">'+(idx===0?'Now':slot.label)+'</span><span class="st">'+fmtTimeShort(slot.t)+'</span>';
    splits.appendChild(cell);
  });

  // weekly pace rail
  const idealPace=(now-wLast)/(wNext-wLast)*100;
  document.getElementById('railFill').style.width=S.weekly+'%';
  document.getElementById('nowMarker').style.left=Math.max(0,Math.min(100,idealPace))+'%';
  document.getElementById('paceIdeal').textContent=idealPace.toFixed(1)+'%';
  document.getElementById('paceActual').textContent=S.weekly+'%';

  // day labels — toggleable between day names and pace %
  const railDays=document.getElementById('railDays');
  // only rebuild if not already populated (toggle handles its own swap)
  if(!railDays._built||railDays._weekDay!==S.weekDay){
    buildDayLabels(now,wLast,wNext);
    railDays._built=true;
    railDays._weekDay=S.weekDay;
  } else {
    // just refresh today highlight
    const spans=railDays.querySelectorAll('span');
    spans.forEach((sp2,i)=>{
      const idx=(S.weekDay+i)%7;
      sp2.className=(idx===now.getDay()?'today':'')+(showPct?' show-pct':'');
    });
  }

  // verdict
  const delta=S.weekly-idealPace;
  const v=document.getElementById('paceVerdict');
  if(delta>4){v.textContent='+'+delta.toFixed(0)+'% ahead';v.style.color='#a03020';}
  else if(delta<-4){v.textContent=Math.abs(delta).toFixed(0)+'% buffer';v.style.color='var(--accent)';}
  else{v.textContent='on pace';v.style.color='#666';}

  document.getElementById('stamp').textContent=fmtTime(now);
}

function buildDayLabels(now,wLast,wNext){
  const railDays=document.getElementById('railDays');
  railDays.innerHTML='';
  for(let i=0;i<7;i++){
    const idx=(S.weekDay+i)%7;
    const sp=document.createElement('span');
    sp.dataset.pos=i; // position in week cycle
    sp.className=(idx===now.getDay()?'today':'')+(showPct?' show-pct':'');
    sp.textContent=showPct?PACE_PCT[i].toFixed(1)+'%':DOW[idx];
    railDays.appendChild(sp);
  }
}

/* ── day label tap toggle ── */
document.getElementById('railDays').addEventListener('click',()=>{
  showPct=!showPct;
  const now=new Date();
  const railDays=document.getElementById('railDays');
  const spans=railDays.querySelectorAll('span');
  spans.forEach((sp,i)=>{
    const idx=(S.weekDay+i)%7;
    sp.className=(idx===now.getDay()?'today':'')+(showPct?' show-pct':'');
    sp.textContent=showPct?PACE_PCT[i].toFixed(1)+'%':DOW[idx];
  });
});

/* ── editor ── */
const editor=document.getElementById('editor');
document.getElementById('editToggle').addEventListener('click',()=>{
  editor.classList.toggle('open');
  if(editor.classList.contains('open')){
    document.getElementById('inTitle').value=S.title||'';
    document.getElementById('inSession').value=S.session;document.getElementById('valSession').textContent=S.session+'%';
    document.getElementById('inWeekly').value=S.weekly;document.getElementById('valWeekly').textContent=S.weekly+'%';
    document.getElementById('inSessionReset').value=S.sessionReset;
    document.getElementById('inWeekDay').value=S.weekDay;
    document.getElementById('inWeekTime').value=S.weekTime;
  }
});
document.getElementById('inSession').addEventListener('input',e=>document.getElementById('valSession').textContent=e.target.value+'%');
document.getElementById('inWeekly').addEventListener('input',e=>document.getElementById('valWeekly').textContent=e.target.value+'%');
document.getElementById('saveBtn').addEventListener('click',()=>{
  S.title=document.getElementById('inTitle').value.trim()||'Claude Usage';
  S.session=+document.getElementById('inSession').value;
  S.weekly=+document.getElementById('inWeekly').value;
  S.sessionReset=document.getElementById('inSessionReset').value||'10:30';
  S.weekDay=+document.getElementById('inWeekDay').value;
  S.weekTime=document.getElementById('inWeekTime').value||'09:00';
  for(const k in S)store.set('cu_'+k,S[k]);
  // force day label rebuild
  document.getElementById('railDays')._built=false;
  editor.classList.remove('open');render();
});

render();
setInterval(render,1000);
</script>
</body>
</html>
